version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: proxm_pg
    environment:
      POSTGRES_USER: proxm
      POSTGRES_PASSWORD: proxm
      POSTGRES_DB: proxm
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxm"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: proxm_redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    container_name: proxm_api
    env_file: ../../apps/api/.env
    ports:
      - "4000:4000"
      - "4001:4001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
